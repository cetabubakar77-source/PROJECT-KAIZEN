<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, Arial, sans-serif;
            background: #f5f7fb;
            color: #111827;
        }

        .card {
            background: #ffffff;
            border: 1px solid #000000;
            border-radius: 14px;
            padding: 24px;
            width: min(92vw, 360px);
            box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 20px;
        }

        p {
            margin: 0 0 20px;
            color: #000000;
            font-size: 14px;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #2563eb;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Welcome</h1>
        <p>Sign in to continue</p>
        <button onclick="signInWithGoogle()">Continue with Google</button>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
